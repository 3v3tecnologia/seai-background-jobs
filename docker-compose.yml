services:
  jobs:
    build: 
      context: .
      args:
        - NODE_ENV=$NODE_ENV
    container_name: "jobs_workers"
    volumes:
      - .:/usr/src/app
      - nodemodules:/usr/src/app/node_modules
    depends_on:
      jobs_database:
        condition: service_healthy
    restart: on-failure
  
    networks:
      - back-tier
      - custom-proxy

  jobs_database:
    image: postgres:14.2
    container_name: "seai-jobs-database"
    user: postgres
    # secrets:
    #   - db-password
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: on-failure
    environment:
      - POSTGRES_PASSWORD=${DB_JOB_PASSWORD}
    healthcheck:
      test: [ "CMD", "pg_isready" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - back-tier
      - custom-proxy

  rabbit1:
    image: "rabbitmq:3-management"
    hostname: "rabbit1"
    environment:
      RABBITMQ_ERLANG_COOKIE: "SWQOKODSQALRPCLNMEQG"
      RABBITMQ_DEFAULT_USER: "rabbitmq"
      RABBITMQ_DEFAULT_PASS: "rabbitmq"
      RABBITMQ_DEFAULT_VHOST: "/"
    ports:
      - "15672:15672"
      - "5672:5672"
    labels:
      NAME: "rabbitmq1"
    volumes:
      - .docker/rabbitmq/data/:/var/lib/rabbitmq/
      - .docker/rabbitmq/log/:/var/log/rabbitmq

volumes:
  db-data: {}
  nodemodules: {}
  nodemodules_api: {}

# secrets:
#   db-password:
#     file: password.txt

networks:
  rabbitmq_go_net:
    driver: bridge
  back-tier:
  custom-proxy:
    external: true
    name: jobs